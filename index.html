<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mising Archives is an independent, community-led initiative to preserve and share knowledge about the Mising Tribe.">
    <meta name="theme-color" content="#FAFAF8">
    <link rel="icon" type="image/png" href="/images/logo.png">
<link rel="apple-touch-icon" href="/images/logo.png">
    <title>Mising Archives</title>
    <link rel="canonical" href="https://www.misingarchives.co.in/">

    <!-- Open Graph (social sharing previews) -->
    <meta property="og:title" content="Mising Archives">
    <meta property="og:description" content="Mising Archives is an independent, community-led initiative to preserve and share knowledge about the Mising Tribe.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.misingarchives.co.in/">
    <meta property="og:image" content="https://www.misingarchives.co.in/images/logo.png">

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Mising Archives">
    <meta name="twitter:description" content="Mising Archives is an independent, community-led initiative to preserve and share knowledge about the Mising Tribe.">
    <meta name="twitter:image" content="https://www.misingarchives.co.in/images/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-secondary);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
